<svg width="560" height="100" viewBox="0 0 560 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- "Coach" text -->
  <text x="10" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#1D1D1F" letter-spacing="-1">Coach</text>
  <!-- "Lab" text -->
  <text x="170" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#1D1D1F" letter-spacing="-1">Lab</text>
  <!-- Video frame icon -->
  <rect x="245" y="18" width="52" height="38" rx="5" stroke="#1D1D1F" stroke-width="2.5" fill="none"/>
  <!-- Play icon -->
  <polygon points="264,10 264,5 268,7.5" fill="#1D1D1F"/>
  <!-- Pause icon -->
  <rect x="271" y="5" width="2" height="5" rx="0.8" fill="#1D1D1F"/>
  <rect x="275" y="5" width="2" height="5" rx="0.8" fill="#1D1D1F"/>
  <!-- Timeline dot -->
  <circle cx="282" cy="7.5" r="2.5" fill="#FF3B30"/>
  <!-- CL inside frame -->
  <text x="252" y="46" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="800" fill="#1D1D1F">C</text>
  <text x="267" y="46" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="800" fill="#FF3B30">L</text>
  <!-- ".academy" text -->
  <text x="300" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="600" fill="#6E6E73" letter-spacing="-0.5">.academy</text>
</svg>
